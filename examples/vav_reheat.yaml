      - {x: 30.0, y: 7.0,  z: 3.5}
      - {x: 30.0, y: 23.0, z: 3.5}
      - {x: 0.0,  y: 23.0, z: 3.5}

  - name: Core Floor
    zone: Core
    type: floor
    construction: Ground Floor
    boundary: ground
    vertices:
      - {x: 0.0,  y: 23.0, z: 0.0}
      - {x: 30.0, y: 23.0, z: 0.0}
      - {x: 30.0, y: 7.0,  z: 0.0}
      - {x: 0.0,  y: 7.0,  z: 0.0}

  # Conference (10m x 10m)
  - name: Conf East Wall
    zone: Conference
    type: wall
    construction: Exterior Wall
    boundary: outdoor
    vertices:
      - {x: 30.0, y: 7.0,  z: 0.0}
      - {x: 30.0, y: 17.0, z: 0.0}
      - {x: 30.0, y: 17.0, z: 3.5}
      - {x: 30.0, y: 7.0,  z: 3.5}

  - name: Conf South Wall
    zone: Conference
    type: wall
    construction: Interior Partition
    boundary: adiabatic
    vertices:
      - {x: 20.0, y: 7.0, z: 0.0}
      - {x: 30.0, y: 7.0, z: 0.0}
      - {x: 30.0, y: 7.0, z: 3.5}
      - {x: 20.0, y: 7.0, z: 3.5}

  - name: Conf North Wall
    zone: Conference
    type: wall
    construction: Interior Partition
    boundary: adiabatic
    vertices:
      - {x: 30.0, y: 17.0, z: 0.0}
      - {x: 20.0, y: 17.0, z: 0.0}
      - {x: 20.0, y: 17.0, z: 3.5}
      - {x: 30.0, y: 17.0, z: 3.5}

  - name: Conf West Wall
    zone: Conference
    type: wall
    construction: Interior Partition
    boundary: adiabatic
    vertices:
      - {x: 20.0, y: 17.0, z: 0.0}
      - {x: 20.0, y: 7.0,  z: 0.0}
      - {x: 20.0, y: 7.0,  z: 3.5}
      - {x: 20.0, y: 17.0, z: 3.5}

  - name: Conf Roof
    zone: Conference
    type: roof
    construction: Flat Roof
    boundary: outdoor
    vertices:
      - {x: 20.0, y: 7.0,  z: 3.5}
      - {x: 30.0, y: 7.0,  z: 3.5}
      - {x: 30.0, y: 17.0, z: 3.5}
      - {x: 20.0, y: 17.0, z: 3.5}

  - name: Conf Floor
    zone: Conference
    type: floor
    construction: Ground Floor
    boundary: ground
    vertices:
      - {x: 20.0, y: 17.0, z: 0.0}
      - {x: 30.0, y: 17.0, z: 0.0}
      - {x: 30.0, y: 7.0,  z: 0.0}
      - {x: 20.0, y: 7.0,  z: 0.0}

# --- HVAC: Central VAV AHU ---
air_loops:
  - name: VAV AHU
    min_vav_fraction: 0.30   # 30% minimum zone airflow (ventilation)
    controls:
      heating_supply_temp: 35.0
      cooling_supply_temp: 13.0
      design_zone_flow: 0.6
      cycling: proportional
    equipment:
      - type: fan
        name: VAV Supply Fan
        source: vav
        design_flow_rate: autosize
        pressure_rise: 750.0
        impeller_efficiency: 0.72
        motor_efficiency: 0.90
        motor_in_airstream_fraction: 1.0

      - type: heating_coil
        name: AHU Preheat Coil
        source: hot_water
        capacity: autosize
        setpoint: 35.0

      - type: cooling_coil
        name: AHU CHW Cooling Coil
        capacity: autosize
        cop: 4.0
        shr: 0.80
        rated_airflow: autosize
        setpoint: 13.0

    zone_terminals:
      - zone: South Perimeter
      - zone: North Perimeter
      - zone: Core
      - zone: Conference

# --- Zone VAV Terminal Reheat Boxes ---
# Each zone has an FCU-type loop acting as a zone terminal reheat box.
# The reheat coil fires in heating mode (zone below heating setpoint).
# These loops recirculate the supply air already delivered by the VAV AHU.

  - name: VAV Box SP
    system_type: fcu          # Zone-level reheat box
    equipment:
      - type: heating_coil
        name: SP Reheat Coil
        source: electric   # Electric reheat
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0
    zone_terminals:
      - zone: South Perimeter

  - name: VAV Box NP
    system_type: fcu
    equipment:
      - type: heating_coil
        name: NP Reheat Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0
    zone_terminals:
      - zone: North Perimeter

  - name: VAV Box Core
    system_type: fcu
    equipment:
      - type: heating_coil
        name: Core Reheat Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0
    zone_terminals:
      - zone: Core

  - name: VAV Box Conf
    system_type: fcu
    equipment:
      - type: heating_coil
        name: Conf Reheat Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0
    zone_terminals:
      - zone: Conference

# --- Plant Loops ---
plant_loops:
  - name: HHW Loop
    design_supply_temp: 82.0
    design_delta_t: 11.0
    supply_equipment:
      - type: boiler
        name: HHW Boiler
        capacity: autosize
        efficiency: 0.85
        design_outlet_temp: 82.0
        design_water_flow_rate: autosize

  - name: CHW Loop
    design_supply_temp: 7.0
    design_delta_t: 5.0
    supply_equipment:
      - type: chiller
        name: Air-Cooled Chiller
        capacity: autosize
        cop: 3.8
        chw_setpoint: 7.0
        design_chw_flow: 0.0

# --- Thermostats ---
thermostats:
  - name: VAV Thermostat
    zones: [VAV Zones]
    heating_setpoint: 21.0
    cooling_setpoint: 24.0

# --- Outputs ---
outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - zone_infiltration_mass_flow
      - zone_supply_air_temperature
      - zone_supply_air_mass_flow
      - site_outdoor_temperature
      - site_direct_normal_radiation

summary_report: true
