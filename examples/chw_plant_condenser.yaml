# OpenBSE Example: Water-Cooled Chiller with Cooling Tower & Condenser Loop
#
# Demonstrates multi-loop plant configuration:
#   - CHW Loop: water-cooled chiller + pump
#   - Condenser Water Loop: cooling tower + pump
#   - Chiller's condenser_plant_loop links the two loops
#
# The simulation engine automatically determines loop order via topological
# sort: CHW loop simulates first (chiller outputs determine condenser demand),
# then the condenser loop simulates with cooling tower rejecting heat.
#
# Building: 2-zone single-story office (simplified)
#   - South Zone (200 m2, 3.05m ceiling)
#   - North Zone (200 m2, 3.05m ceiling)
#
# HVAC: VAV AHU with CHW cooling coil, HW preheat, per-zone reheat
#
# Weather: Denver, CO

simulation:
  timesteps_per_hour: 1
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31

weather_files:
  - "/Users/benjaminbrannon/Documents/WeatherFiles/USA_CO_Boulder.Muni.AP.720533_TMYx.2009-2023.epw"

design_days:
  - name: Denver Heating 99.6%
    design_temp: -17.8
    daily_range: 0.0
    humidity_type: wetbulb
    humidity_value: -17.8
    pressure: 83411.0
    wind_speed: 2.3
    month: 1
    day: 21
    day_type: winter

  - name: Denver Cooling 0.4%
    design_temp: 34.1
    daily_range: 15.2
    humidity_type: wetbulb
    humidity_value: 15.7
    pressure: 83411.0
    wind_speed: 4.0
    month: 7
    day: 21
