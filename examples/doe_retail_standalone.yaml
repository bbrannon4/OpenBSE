  # CORE RETAIL SURFACES
  # Zone: X=[0, 54.27], Y=[6.0, 35.27], Z=[0, 6.096]
  # Exterior walls: east (partial), west (partial)
  # Interior walls: north (Back Space), south split into 3 segments
