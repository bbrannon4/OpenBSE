# ─── Materials ──────────────────────────────────────────────────────────────
# DOE Prototype opaque material definitions (90.1-2019, CZ 5B)

materials:
  # ── Exterior Wall Assembly ──
  # Outside to inside: 200mm normalweight concrete, insulation board, 13mm gypsum

  - name: Normalweight Concrete 200mm
    conductivity: 2.31           # W/(m-K) normalweight concrete
    density: 2322.0              # kg/m³
    specific_heat: 832.0         # J/(kg-K)
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  - name: Wall Insulation Board
    conductivity: 0.049          # Effective: thickness/R = 0.08/1.64
    density: 30.0                # Lightweight insulation board
    specific_heat: 1200.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  - name: Gypsum Board 13mm
    conductivity: 0.16           # W/(m-K)
    density: 800.0               # kg/m³
    specific_heat: 1090.0        # J/(kg-K)
    solar_absorptance: 0.4
    thermal_absorptance: 0.9
    roughness: smooth

  # ── Roof Assembly ──
  # Outside to inside: built-up roofing, insulation board, metal deck

  - name: Built-up Roofing
    conductivity: 0.16
    density: 1120.0
    specific_heat: 1460.0
    solar_absorptance: 0.77      # Dark roof membrane
    thermal_absorptance: 0.9
    roughness: very_rough

  - name: Roof Insulation Board
    conductivity: 0.019          # Effective: thickness/R = 0.1/5.31
    density: 30.0
    specific_heat: 1200.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  - name: Metal Deck
    conductivity: 45.28          # Steel
    density: 7824.0
    specific_heat: 500.0
    solar_absorptance: 0.5
    thermal_absorptance: 0.9
    roughness: smooth

  # ── Interior Partition ──
  # Double layer 13mm gypsum (no stud cavity modeled)

  - name: Interior Gypsum 13mm
    conductivity: 0.16
    density: 800.0
    specific_heat: 1090.0
    solar_absorptance: 0.4
    thermal_absorptance: 0.9
    roughness: smooth

  # ── Floor Slab Assembly ──
  # Simplified from F-factor ground floor: concrete slab + carpet pad

  - name: Concrete Slab 100mm
    conductivity: 2.31
    density: 2322.0
    specific_heat: 832.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  - name: Carpet Pad
    conductivity: 0.06
    density: 288.0
    specific_heat: 1380.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_smooth

# ─── Constructions ──────────────────────────────────────────────────────────
# Layered constructions: outside layer first, inside layer last.

constructions:
  # Mass exterior wall: concrete + insulation + gypsum
  # U-factor approx 0.51 W/(m²K) per 90.1-2019 Table 5.5-3 (CZ 5B)
  - name: Exterior Wall
    layers:
      - material: Normalweight Concrete 200mm    # outside (exposed)
        thickness: 0.2032                        # 200mm (8 inches)
      - material: Wall Insulation Board
        thickness: 0.08                          # Effective thickness to achieve R-1.64 m²K/W
      - material: Gypsum Board 13mm              # inside (room side)
        thickness: 0.0127                        # 13mm (1/2 inch)

  # Insulated metal deck roof
  # U-factor approx 0.18 W/(m²K) per 90.1-2019 Table 5.5-3 (CZ 5B)
  - name: Roof Assembly
    layers:
      - material: Built-up Roofing               # outside (exposed)
        thickness: 0.0095                        # ~3/8 inch
      - material: Roof Insulation Board
        thickness: 0.1                           # Effective thickness to achieve R-5.31 m²K/W
      - material: Metal Deck                     # inside (room side)
        thickness: 0.0008                        # Thin metal deck

  # Interior partition: double gypsum
  - name: Interior Partition
    layers:
      - material: Interior Gypsum 13mm
        thickness: 0.0127
      - material: Interior Gypsum 13mm
        thickness: 0.0127

  # Ground floor slab with carpet (only for interior partitions or non-ground floors)
  - name: Ground Floor
    layers:
      - material: Concrete Slab 100mm            # outside (ground side)
        thickness: 0.1016                        # 100mm (4 inches)
      - material: Carpet Pad                     # inside (room side)
        thickness: 0.01

# ─── Simple Constructions ─────────────────────────────────────────────────
# F-factor slab-on-grade floor constructions per EnergyPlus.
# E+ uses the GroundContact:FloorSlab:Settings method which computes
# effective U-factors using Winkelmann's correlations for slab-on-grade
# with insulation and soil thermal properties. These are MUCH lower than
# the U-factor of just the concrete slab material alone.
# Thermal capacity from 100mm concrete slab: 2322 * 832 * 0.1016 = 196,275 J/(m²K)

simple_constructions:
  # Back Space floor: F-factor = 1.264 W/(m-K), effective U = 0.162 W/(m²K)
  - name: Ground Floor Back Space
    u_factor: 0.162
    thickness: 0.1016
    thermal_capacity: 196275.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9

  # Core Retail floor: F-factor = 0.730 W/(m-K), effective U = 0.033 W/(m²K)
  # Very low because large core zone has high area-to-perimeter ratio
  - name: Ground Floor Core Retail
    u_factor: 0.033
    thickness: 0.1016
    thermal_capacity: 196275.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9

  # POS / Front Retail floor: F-factor = 1.264, effective U = 0.186 W/(m²K)
  - name: Ground Floor Perimeter
    u_factor: 0.186
    thickness: 0.1016
    thermal_capacity: 196275.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9

  # Front Entry floor: effective U = 0.300 W/(m²K)
  - name: Ground Floor Entry
    u_factor: 0.300
    thickness: 0.1016
    thermal_capacity: 196275.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9

# ─── Window Constructions ───────────────────────────────────────────────────
# Performance-based window definitions (U-factor + SHGC).

window_constructions:
  # Standard window per 90.1-2019 Table 5.5-3 (CZ 5B, nonmetal framing)
  - name: Standard Window
    u_factor: 2.0442             # W/(m²K)
    shgc: 0.38
    visible_transmittance: 0.418

  # Skylight per 90.1-2019 Table 5.5-3 (CZ 5B)
  - name: Skylight
    u_factor: 2.8391
    shgc: 0.40
    visible_transmittance: 0.40

# ─── Zones ──────────────────────────────────────────────────────────────────
# 5 thermal zones per DOE prototype. Volume and floor area auto-calculated
# from surface vertices (set to 0 or omitted).

zones:
  # ── Back Space ──
  # Storage/receiving area along the north wall.
  # 54.27m x 7.0m x 6.096m = 2,317.33 m³
  - name: Back Space

  # ── Core Retail ──
  # Main sales floor occupying the building core.
  # 54.27m x 29.27m x 6.096m = 9,762.95 m³
  # 12 skylights provide daylighting to this interior zone.
  - name: Core Retail

  # ── Point of Sale ──
  # Checkout area at the southwest corner of the building.
  # 25.135m x 6.0m x 6.096m = 919.94 m³
  - name: Point of Sale

  # ── Front Retail ──
  # Retail display area at the southeast corner of the building.
  # 25.135m x 6.0m x 6.096m = 919.94 m³
  - name: Front Retail

  # ── Front Entry ──
  # Vestibule/entry area between POS and Front Retail zones.
  # 4.0m x 3.0m x 6.096m = 73.15 m³
  # Heated only (unit heater), no cooling.
  - name: Front Entry

# ─── People ─────────────────────────────────────────────────────────────────
# DOE prototype internal gains: people density = 6.193 m²/person
# Activity level: 120 W/person (standing/light work, sensible + latent)
# Using area_per_person [m²/person] — the engine computes count = floor_area / area_per_person

people:
  # All retail zones share the same occupant density (6.193 m²/person)
  # Using area_per_person instead of specifying count per zone.
  - name: Back Space People
    zones: [Back Space]
    area_per_person: 6.193       # m²/person (DOE prototype)
    activity_level: 120.0        # W/person (standing/light work)
    radiant_fraction: 0.3
    schedule: Retail Occupancy

  - name: Core Retail People
    zones: [Core Retail]
    area_per_person: 6.193
    activity_level: 120.0
    radiant_fraction: 0.3
    schedule: Retail Occupancy

  # Point of Sale and Front Retail share identical people properties
  - name: Front Zone People
    zones: [Point of Sale, Front Retail]
    area_per_person: 6.193
    activity_level: 120.0
    radiant_fraction: 0.3
    schedule: Retail Occupancy

# ─── Lights ─────────────────────────────────────────────────────────────────
# Lighting power density varies by zone (Back Space storage vs. retail floor).
# Using watts_per_area [W/m²] — the engine computes power = watts_per_area × floor_area.

lights:
  # Back Space: lower lighting density (storage area)
  - name: Back Space Lights
    zones: [Back Space]
    watts_per_area: 4.6739       # W/m² (storage LPD)
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Lighting Back Space

  # Core Retail and Point of Sale share the same LPD
  - name: Core Retail Lights
    zones: [Core Retail]
    watts_per_area: 11.3021      # W/m² (retail sales LPD)
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Lighting Core Retail

  - name: Point of Sale Lights
    zones: [Point of Sale]
    watts_per_area: 11.3021      # W/m² (same as Core Retail)
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Lighting Core Retail

  - name: Front Retail Lights
    zones: [Front Retail]
    watts_per_area: 11.3021      # W/m² (retail sales LPD)
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Lighting Front Retail

  - name: Front Entry Lights
    zones: [Front Entry]
    watts_per_area: 9.0417       # W/m² (vestibule LPD)
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Lighting Front Entry

# ─── Equipment ──────────────────────────────────────────────────────────────
# Plug/process equipment loads from DOE prototype (exact E+ EquipmentLevel).

equipment:
  - name: Back Space Equipment
    zones: [Back Space]
    power: 3065.7123             # E+ EquipmentLevel (exact)
    radiant_fraction: 0.5        # E+ Fraction Radiant = 0.5000
    schedule: Retail Equipment

  - name: Core Retail Equipment
    zones: [Core Retail]
    power: 5169.5598             # E+ EquipmentLevel (exact)
    radiant_fraction: 0.5        # E+ Fraction Radiant = 0.5000
    schedule: Retail Equipment

  - name: Point of Sale Equipment
    zones: [Point of Sale]
    power: 3245.4312             # E+ EquipmentLevel (exact)
    radiant_fraction: 0.5        # E+ Fraction Radiant = 0.5000
    schedule: Retail Equipment

  - name: Front Retail Equipment
    zones: [Front Retail]
    power: 487.1163              # E+ EquipmentLevel (exact)
    radiant_fraction: 0.5        # E+ Fraction Radiant = 0.5000
    schedule: Retail Equipment

# ─── Infiltration ───────────────────────────────────────────────────────────
# DOE prototype uses Flow/ExteriorWallArea method with PNNL schedule.
# Using flow_per_exterior_wall_area [m³/(s·m²)] — the engine computes
# design_flow_rate from the zone's outdoor-boundary wall surface areas.
# Schedule reduces to 25% during HVAC operation hours.

infiltration:
  - name: Back Space Infiltration
    zones: [Back Space]
    flow_per_exterior_wall_area: 0.00029757  # m³/(s·m²) exterior wall
    constant_coefficient: 0.0    # PNNL wind-driven model: no constant term
    wind_coefficient: 0.224      # Wind speed coefficient [s/m]
    schedule: Infiltration Schedule

  - name: Core Retail Infiltration
    zones: [Core Retail]
    flow_per_exterior_wall_area: 0.00010355  # m³/(s·m²) exterior wall
    constant_coefficient: 0.0    # PNNL wind-driven model
    wind_coefficient: 0.224      # Wind speed coefficient [s/m]
    schedule: Infiltration Schedule

  - name: Point of Sale Infiltration
    zones: [Point of Sale]
    flow_per_exterior_wall_area: 0.00031691  # m³/(s·m²) exterior wall
    constant_coefficient: 0.0    # PNNL wind-driven model
    wind_coefficient: 0.224      # Wind speed coefficient [s/m]
    schedule: Infiltration Schedule

  - name: Front Retail Infiltration
    zones: [Front Retail]
    flow_per_exterior_wall_area: 0.00031691  # m³/(s·m²) exterior wall
    constant_coefficient: 0.0    # PNNL wind-driven model
    wind_coefficient: 0.224      # Wind speed coefficient [s/m]
    schedule: Infiltration Schedule

  # Front Entry has two infiltration sources:
  # 1. Envelope cracks (wind-driven, flow per exterior wall area)
  - name: Front Entry Envelope Infiltration
    zones: [Front Entry]
    flow_per_exterior_wall_area: 0.00038120  # m³/(s·m²) exterior wall
    constant_coefficient: 0.0    # PNNL wind-driven model
    wind_coefficient: 0.224      # Wind speed coefficient [s/m]
    schedule: Infiltration Schedule

  # 2. Door opening infiltration (customer traffic — absolute flow rate)
  - name: Front Entry Door Infiltration
    zones: [Front Entry]
    design_flow_rate: 0.9373     # m³/s — entrance door traffic per E+ IDF
    constant_coefficient: 1.0    # Constant (not wind-dependent)
    schedule: Door Opening Schedule

# ─── Outdoor Air ────────────────────────────────────────────────────────────
# ASHRAE 62.1 ventilation rates, per_area method from DOE prototype.

outdoor_air:
  - name: Back Space Outdoor Air
    zones: [Back Space]
    per_area: 0.000609562        # m³/(s-m²) per ASHRAE 62.1 (storage)

  # Core Retail, Point of Sale, Front Retail, and Front Entry share the
  # same per-area outdoor air rate per ASHRAE 62.1 (retail)
  - name: Retail Zones Outdoor Air
    zones: [Core Retail, Point of Sale, Front Retail, Front Entry]
    per_area: 0.001181026        # m³/(s-m²) per ASHRAE 62.1 (retail)

# ─── Exhaust Fans ───────────────────────────────────────────────────────────
# No exhaust fans in the DOE Retail Standalone prototype.

exhaust_fans: []

# ─── Surfaces ───────────────────────────────────────────────────────────────
# All surfaces use vertex-based geometry (CCW from outside per convention).
# Coordinate origin: SW corner of building at ground level.
# X = East, Y = North, Z = Up.  Ceiling height H = 6.096 m.
#
# Zone coordinate boundaries:
#   Back Space:     X=[0, 54.27], Y=[35.27, 42.27]
#   Core Retail:    X=[0, 54.27], Y=[6.0, 35.27]
#   Point of Sale:  X=[0, 25.135], Y=[0, 6.0]
#   Front Entry:    X=[25.135, 29.135], Y=[0, 3.0]
#   Front Retail:   X=[29.135, 54.27], Y=[0, 6.0]

surfaces:
  # ════════════════════════════════════════════════════════════════════════════
  # BACK SPACE SURFACES
  # Zone: X=[0, 54.27], Y=[35.27, 42.27], Z=[0, 6.096]
  # Exterior walls: north, east (partial), west (partial)
  # Interior wall: south (adjacent to Core Retail)
  # ════════════════════════════════════════════════════════════════════════════

  # Back Space - North Wall (exterior, faces north)
  # Vertices CCW from outside (looking south at the wall from the north)
  - name: Back Space North Wall
    zone: Back Space
    type: wall
    construction: Exterior Wall
    boundary: outdoor
    vertices:
      - {x: 54.27, y: 42.27, z: 0.0}
      - {x: 0.0,   y: 42.27, z: 0.0}
      - {x: 0.0,   y: 42.27, z: 6.096}
      - {x: 54.27, y: 42.27, z: 6.096}

  # Back Space - North Wall Window (small strip window for daylighting)
  - name: Back Space North Window
    zone: Back Space
    type: window
    construction: Standard Window
    boundary: outdoor
    parent_surface: Back Space North Wall
    vertices:
      - {x: 50.0,  y: 42.27, z: 1.0}
      - {x: 4.27,  y: 42.27, z: 1.0}
      - {x: 4.27,  y: 42.27, z: 2.5}
      - {x: 50.0,  y: 42.27, z: 2.5}

  # Back Space - East Wall (exterior, faces east)
  # Only the back space portion: Y=[35.27, 42.27]
  - name: Back Space East Wall
    zone: Back Space
    type: wall
    construction: Exterior Wall
    boundary: outdoor
    vertices:
      - {x: 54.27, y: 35.27, z: 0.0}
      - {x: 54.27, y: 42.27, z: 0.0}
      - {x: 54.27, y: 42.27, z: 6.096}
      - {x: 54.27, y: 35.27, z: 6.096}

  # Back Space - West Wall (exterior, faces west)
  # Only the back space portion: Y=[35.27, 42.27]
  - name: Back Space West Wall
    zone: Back Space
    type: wall
    construction: Exterior Wall
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 42.27, z: 0.0}
      - {x: 0.0, y: 35.27, z: 0.0}
      - {x: 0.0, y: 35.27, z: 6.096}
      - {x: 0.0, y: 42.27, z: 6.096}

  # Back Space - South Wall (interior, adjacent to Core Retail)
  - name: Back Space South Wall
    zone: Back Space
    type: wall
    construction: Interior Partition
    boundary: !zone "Core Retail"
    vertices:
      - {x: 0.0,   y: 35.27, z: 0.0}
      - {x: 54.27, y: 35.27, z: 0.0}
      - {x: 54.27, y: 35.27, z: 6.096}
      - {x: 0.0,   y: 35.27, z: 6.096}

  # Back Space - Roof (exterior, faces up)
  - name: Back Space Roof
    zone: Back Space
    type: roof
    construction: Roof Assembly
    boundary: outdoor
    vertices:
      - {x: 0.0,   y: 35.27, z: 6.096}
      - {x: 54.27, y: 35.27, z: 6.096}
      - {x: 54.27, y: 42.27, z: 6.096}
      - {x: 0.0,   y: 42.27, z: 6.096}

  # Back Space - Floor (ground contact, F-factor slab)
  - name: Back Space Floor
    zone: Back Space
    type: floor
    construction: Ground Floor Back Space
    boundary: ground
    vertices:
      - {x: 0.0,   y: 42.27, z: 0.0}
      - {x: 54.27, y: 42.27, z: 0.0}
      - {x: 54.27, y: 35.27, z: 0.0}
      - {x: 0.0,   y: 35.27, z: 0.0}

