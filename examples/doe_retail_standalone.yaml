# ─── HVAC Systems ───────────────────────────────────────────────────────────
# 5 air loops per DOE prototype:
#   4 PSZ-AC rooftop units (packaged single-zone AC with gas furnace + DX cooling)
#   1 unit heater for Front Entry (gas heating only, no cooling coil)
#
# Each PSZ-AC has: constant volume fan → gas furnace → DX cooling coil
# ─── Performance Curves ──────────────────────────────────────────────────────
# Reusable biquadratic curves for DX coil capacity and EIR modifiers.
# Curves are f(T_wb_entering [°C], T_db_outdoor [°C]).
# Coefficients from DOE prototype models (90.1-2019).

performance_curves:
  - name: DX Cool Cap fT
    curve_type: biquadratic
    coefficients: [0.942587793, 0.009543347, 0.000683770, -0.011042676, 0.000005249, -0.000009720]
    min_x: 12.78
    max_x: 23.89
    min_y: 18.33
    max_y: 46.11

  - name: DX Cool EIR fT
    curve_type: biquadratic
    coefficients: [0.342414409, 0.034885008, -0.000623700, 0.004977216, 0.000437951, -0.000728028]
    min_x: 12.78
    max_x: 23.89
    min_y: 18.33
    max_y: 46.11

# Equipment sizes from DOE prototype IDF (90.1-2019, CZ 5B)

air_loops:
  # ── PSZ-AC: Back Space ──
  # Serves the storage/receiving zone along the north wall.
  # Smaller unit with moderate heating load (exterior walls on 3 sides).
  - name: PSZ-AC Back Space
    availability_schedule: HVAC Operation
    controls:
      heating_supply_temp: 40.0
      cooling_supply_temp: 12.8
      design_zone_flow: 1.0
    equipment:
      - type: fan
        name: Back Space Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 622.5       # Pa
        impeller_efficiency: 0.65
        motor_efficiency: 0.895
      - type: heating_coil
        name: Back Space Furnace
        source: gas
        capacity: autosize
        setpoint: 40.0             # Supply air temp setpoint [C]
        efficiency: 0.81           # Gas furnace thermal efficiency
      - type: cooling_coil
        name: Back Space DX
        capacity: 32422.0          # 32.4 kW rated cooling (Speed 2 from IDF)
        cop: 3.799
        shr: 0.797
        rated_airflow: autosize
        setpoint: 12.8
    zones:
      - zone: Back Space

  # ── PSZ-AC: Core Retail ──
  # Serves the large main sales floor. Largest unit in the building.
  # Interior zone with skylights — significant solar and internal gains.
  - name: PSZ-AC Core Retail
    availability_schedule: HVAC Operation
    controls:
      heating_supply_temp: 40.0
      cooling_supply_temp: 12.8
      design_zone_flow: 1.0
    equipment:
      - type: fan
        name: Core Retail Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 1018.41     # Pa (higher for larger ductwork)
        impeller_efficiency: 0.65
        motor_efficiency: 0.93
      - type: heating_coil
        name: Core Retail Furnace
        source: gas
        capacity: autosize
        setpoint: 40.0
        efficiency: 0.80
      - type: cooling_coil
        name: Core Retail DX
        capacity: 137784.0         # 137.8 kW rated cooling
        cop: 3.399
        shr: 0.789
        rated_airflow: autosize
        setpoint: 12.8
        cap_ft_curve: DX Cool Cap fT
        eir_ft_curve: DX Cool EIR fT
    zones:
      - zone: Core Retail

  # ── PSZ-AC: Point of Sale ──
  # Serves the checkout area at the southwest corner.
  # Moderate equipment loads from POS terminals.
  - name: PSZ-AC Point of Sale
    availability_schedule: HVAC Operation
    controls:
      heating_supply_temp: 40.0
      cooling_supply_temp: 12.8
      design_zone_flow: 1.0
    equipment:
      - type: fan
        name: POS Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 622.5
        impeller_efficiency: 0.65
        motor_efficiency: 0.865
      - type: heating_coil
        name: POS Furnace
        source: gas
        capacity: autosize
        setpoint: 40.0
        efficiency: 0.81
      - type: cooling_coil
        name: POS DX
        capacity: 19866.0          # 19.9 kW rated cooling
        cop: 3.799
        shr: 0.799
        rated_airflow: autosize
        setpoint: 12.8
    zones:
      - zone: Point of Sale

  # ── PSZ-AC: Front Retail ──
  # Serves the display area at the southeast corner.
  # Smaller equipment loads, significant glazing on south and east.
  - name: PSZ-AC Front Retail
    availability_schedule: HVAC Operation
    controls:
      heating_supply_temp: 40.0
      cooling_supply_temp: 12.8
      design_zone_flow: 1.0
    equipment:
      - type: fan
        name: Front Retail Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 622.5
        impeller_efficiency: 0.65
        motor_efficiency: 0.865
      - type: heating_coil
        name: Front Retail Furnace
        source: gas
        capacity: autosize
        setpoint: 40.0
        efficiency: 0.81
      - type: cooling_coil
        name: Front Retail DX
        capacity: 14678.0          # 14.7 kW rated cooling
        cop: 4.117
        shr: 0.799
        rated_airflow: autosize
        setpoint: 12.8
    zones:
      - zone: Front Retail

  # ── Unit Heater: Front Entry ──
  # Heating-only system for the entry vestibule.
  # No cooling coil — only prevents freezing/maintains minimum comfort.
  - name: Unit Heater Front Entry
    availability_schedule: HVAC Operation
    controls:
      heating_supply_temp: 40.0
      cooling_supply_temp: 12.8
      design_zone_flow: 0.1
    equipment:
      - type: fan
        name: Front Entry Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 622.5
        impeller_efficiency: 0.65
        motor_efficiency: 0.895
      - type: heating_coil
        name: Front Entry Heater
        source: gas
        capacity: autosize
        setpoint: 40.0
        efficiency: 0.81
    zones:
      - zone: Front Entry

# ─── Zone Groups ───────────────────────────────────────────────────────────
# Logical groupings of thermal zones for thermostat and HVAC control.

zone_groups:
  # Main retail zones: full comfort conditioning
  - name: Retail Zones
    zones:
      - Back Space
      - Core Retail
      - Point of Sale
      - Front Retail

  # Entry vestibule: heating only, relaxed setpoints
  - name: Entry Zone
    zones:
      - Front Entry

# ─── Thermostats ───────────────────────────────────────────────────────────
# Thermostat setpoints per DOE prototype:
#   Occupied heating: 21.11 C (70 F)
#   Occupied cooling: 23.89 C (75 F)
# Front Entry: lower heating setpoint (16 C), no active cooling.

thermostats:
  # Retail zones thermostat: standard occupied/unoccupied setpoints
  - name: Retail Thermostat
    zones: [Retail Zones]
    heating_setpoint: 21.11      # 70 F (occupied)
    cooling_setpoint: 23.89      # 75 F (occupied)
    unoccupied_heating_setpoint: 15.56  # 60 F (night setback per E+ HTGSETP_SCH)
    unoccupied_cooling_setpoint: 29.44  # 85 F (night setup per E+ CLGSETP_SCH)

  # Entry vestibule thermostat: heating only, relaxed setpoints
  - name: Entry Thermostat
    zones: [Entry Zone]
    heating_setpoint: 16.0       # Minimum heating to prevent freezing
    cooling_setpoint: 100.0      # Effectively no cooling (setpoint unreachable)
    unoccupied_heating_setpoint: 15.56  # Night setback (close to occupied for entry)
    unoccupied_cooling_setpoint: 100.0  # No cooling

# ─── Outputs ────────────────────────────────────────────────────────────────

outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - zone_infiltration_mass_flow
      - site_outdoor_temperature

summary_report: true
