# ============================================================================
# OpenBSE Model: DOE ASHRAE 90.1-2019 Retail Standalone Prototype Building
# ============================================================================
#
# Source: U.S. Department of Energy Commercial Prototype Building Models
#         ASHRAE Standard 90.1-2019, Climate Zone 5B (Denver, CO)
#         Building type: Retail Standalone (RetailStandalone_90.1-2019)
#
# Reference: https://www.energycodes.gov/prototype-building-models
#
# Building Description:
#   - Single-story retail building, 2,294 m² (24,695 ft²) total floor area
#   - 5 thermal zones: Back Space, Core Retail, Point of Sale, Front Entry,
#     Front Retail
#   - Floor-to-ceiling height: 6.096 m (20 ft)
#   - Rectangular footprint: 54.27 m x 42.27 m
#   - Mass exterior walls (200mm concrete + R-1.64 insulation + gypsum)
#   - Insulated metal deck roof (built-up roofing + R-5.31 insulation)
#   - 5 HVAC air loops: 4 PSZ-AC rooftop units + 1 unit heater (Front Entry)
#   - Gas furnace heating, DX cooling
#   - Denver climate zone 5B design conditions
#
# Coordinate System:
#   Origin: Southwest corner of building at ground level
#   X = East, Y = North, Z = Up
#   Ceiling height: 6.096 m (20 ft)
#
# Zone Layout (plan view, looking down):
#
#                  North (Y=42.27)
# ┌────────────────────────────────────────────────────┐ Y=42.27
# │                  Back_Space                         │
# │            54.27m x 7.0m  (379.89 m²)              │
# │         Volume: 2,317.33 m³                         │
# ├────────────────────────────────────────────────────┤ Y=35.27
# │                                                     │
# │                                                     │
# │              Core_Retail                             │
# │       54.27m x 29.27m  (1,600.48 m²)               │
# │           Volume: 9,762.95 m³                       │
# │                                                     │
# │                                                     │
# ├────────┬──────┬────────────────────────────────────┤ Y=6.0
# │  POS   │Entry │         Front_Retail                │
# │25.135x │4x3m  │        25.135x6.0m                  │
# │ 6.0m   │12 m² │        150.81 m²                    │
# │150.81m²│73.2m³│        919.94 m³                    │
# │919.94m³│      │                                     │
# └────────┴──────┴────────────────────────────────────┘ Y=0
# X=0    X=25.135 X=29.135                          X=54.27
#                  South
#
# ============================================================================

# ─── Simulation Settings ────────────────────────────────────────────────────

simulation:
  timesteps_per_hour: 4       # 15-minute timestep (E+ uses 6/hr = 10-min)
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31

# ─── Weather File ───────────────────────────────────────────────────────────
# TMYx weather data for Boulder/Denver, CO (Climate Zone 5B)

weather_files:
  - "/Users/benjaminbrannon/Documents/WeatherFiles/USA_CO_Boulder.Muni.AP.720533_TMYx.2009-2023.epw"

# ─── Design Days (ASHRAE 90.1-2019 Appendix B, Denver) ─────────────────────
# Used for autosizing HVAC equipment capacity and airflow rates.

design_days:
  # Winter design day: 99.6% heating design temperature
  - name: Denver Heating 99.6%
    design_temp: -17.9          # 99.6% heating DB [C]
    daily_range: 0.0            # No daily range for heating DD
    humidity_type: wetbulb
    humidity_value: -17.9
    pressure: 82237.0           # Denver elevation station pressure [Pa]
    wind_speed: 2.5
    month: 12
    day: 21
    day_type: winter

  # Summer design day: 0.4% cooling design temperature
  - name: Denver Cooling 0.4%
    design_temp: 33.9           # 0.4% cooling DB [C]
    daily_range: 14.8           # Mean daily range [C]
    humidity_type: wetbulb
    humidity_value: 15.0        # MCWB [C]
    pressure: 82237.0
    wind_speed: 3.6
    month: 7
    day: 21
    day_type: summer

