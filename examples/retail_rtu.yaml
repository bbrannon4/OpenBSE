# OpenBSE Example: Retail Store with RTU (Rooftop Unit)
#
# A simple retail building within a larger structure:
#   - Sales Area (~80 m²): main retail space with south-facing storefront window
#   - Office (~12 m²): small back office, conditioned by same RTU
#   - Restroom (~6 m²): unconditioned, with exhaust fan
#   - Storage (~15 m²): unconditioned
#
# Envelope assumptions:
#   - South wall: storefront glazing (large window)
#   - North wall: exterior wall (back of building)
#   - East/West walls: adiabatic (shared with adjacent tenant spaces)
#   - Roof: adiabatic (multi-story building, conditioned space above)
#   - Floor: ground contact (slab on grade)
#
# HVAC: PSZ-AC (Packaged Single Zone Air Conditioner / RTU)
#   - Gas furnace heating coil (15 kW, 80% efficiency)
#   - DX cooling coil (10.5 kW, COP 3.5)
#   - Constant volume supply fan
#   - Thermostat in Sales Area controls both Sales + Office
#
# Ventilation: ASHRAE 62.1-2022 (retail + office rates)
#
# Weather: Boulder, CO (Denver area) TMYx
#
# Building Geometry (plan view, looking down):
#
#    North
#   ┌─────────────────────────────────────────────────┐
#   │  Office (4×3)  │ Restroom (2×3) │ Storage (5×3) │ y=8
#   │                │                │               │
#   ├────────────────┴────────────────┴───────────────┤ y=5
#   │                                                 │
#   │                Sales Area (12×5)                 │
#   │                                                 │
#   │              (12m wide × ~5m deep)              │
#   │                                                 │
#   └══════════════════════════════════════════════════┘ y=0
#    x=0     South (storefront window)              x=12
#
# Coordinate system: X=East, Y=North, Z=Up
# Ceiling height: 3.66m (12 ft) — typical retail
# Vertices are CCW from outside per convention.

simulation:
  timesteps_per_hour: 1
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31

weather_files:
  - "/Users/benjaminbrannon/Documents/WeatherFiles/USA_CO_Boulder.Muni.AP.720533_TMYx.2009-2023.epw"

# ─── Design Days (for autosizing) ──────────────────────────────────────
# Denver/Boulder climate zone 5B design conditions

design_days:
  - name: Boulder Heating 99.6%
    design_temp: -17.8            # 99.6% heating design temp [°C]
    daily_range: 0.0
    humidity_type: wetbulb
    humidity_value: -17.8
    pressure: 83411.0             # Boulder elevation pressure [Pa]
    wind_speed: 2.3
    month: 1
    day: 21
    day_type: winter

  - name: Boulder Cooling 0.4%
    design_temp: 34.1             # 0.4% cooling design temp [°C]
    daily_range: 15.2
    humidity_type: wetbulb
    humidity_value: 15.7
    pressure: 83411.0
    wind_speed: 4.0
    month: 7
    day: 21
    day_type: summer

