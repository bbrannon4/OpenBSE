      - {x: 20.0, y: 10.0, z: 0.0}

# --- HVAC Air Loops ---
# DOAS: 100% OA, pre-conditions ventilation air
air_loops:
  - name: DOAS
    controls:
      heating_supply_temp: 20.0    # Neutral supply
      cooling_supply_temp: 18.0
      design_zone_flow: 0.5
      minimum_damper_position: 1.0  # 100% outdoor air
    equipment:
      - type: fan
        name: DOAS Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 750.0
        impeller_efficiency: 0.72
        motor_efficiency: 0.90
        motor_in_airstream_fraction: 1.0

      - type: heating_coil
        name: DOAS HW Preheat Coil
        source: hot_water
        capacity: autosize
        setpoint: 20.0

      - type: cooling_coil
        name: DOAS CHW Cooling Coil
        capacity: autosize
        cop: 4.0
        shr: 0.80
        rated_airflow: autosize
        setpoint: 18.0

    zone_terminals:
      - zone: Open Office
      - zone: Conference Room
      - zone: Lobby

  # FCU - Open Office
  - name: FCU-Open Office
    system_type: fcu         # Recirculating fan coil unit, per-zone thermostat
    controls:
      heating_supply_temp: 35.0
      cooling_supply_temp: 13.0
      design_zone_flow: 0.5
    equipment:
      - type: fan
        name: FCU-OO Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 200.0
        impeller_efficiency: 0.65
        motor_efficiency: 0.85
        motor_in_airstream_fraction: 1.0

      - type: heating_coil
        name: FCU-OO Heating Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0

      - type: cooling_coil
        name: FCU-OO Cooling Coil
        capacity: autosize
        cop: 4.2
        shr: 0.80
        rated_airflow: autosize
        setpoint: 13.0

    zone_terminals:
      - zone: Open Office

  # FCU - Conference Room
  - name: FCU-Conference
    system_type: fcu
    controls:
      heating_supply_temp: 35.0
      cooling_supply_temp: 13.0
      design_zone_flow: 0.5
    equipment:
      - type: fan
        name: FCU-Conf Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 200.0
        impeller_efficiency: 0.65
        motor_efficiency: 0.85
        motor_in_airstream_fraction: 1.0

      - type: heating_coil
        name: FCU-Conf Heating Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0

      - type: cooling_coil
        name: FCU-Conf Cooling Coil
        capacity: autosize
        cop: 4.2
        shr: 0.80
        rated_airflow: autosize
        setpoint: 13.0

    zone_terminals:
      - zone: Conference Room

  # FCU - Lobby
  - name: FCU-Lobby
    system_type: fcu
    controls:
      heating_supply_temp: 35.0
      cooling_supply_temp: 13.0
      design_zone_flow: 0.5
    equipment:
      - type: fan
        name: FCU-Lobby Fan
        source: constant_volume
        design_flow_rate: autosize
        pressure_rise: 200.0
        impeller_efficiency: 0.65
        motor_efficiency: 0.85
        motor_in_airstream_fraction: 1.0

      - type: heating_coil
        name: FCU-Lobby Heating Coil
        source: electric
        capacity: autosize
        setpoint: 35.0
        efficiency: 1.0

      - type: cooling_coil
        name: FCU-Lobby Cooling Coil
        capacity: autosize
        cop: 4.2
        shr: 0.80
        rated_airflow: autosize
        setpoint: 13.0

    zone_terminals:
      - zone: Lobby

# --- Plant Loops ---
plant_loops:
  - name: HHW Loop
    design_supply_temp: 82.0
    design_delta_t: 11.0
    supply_equipment:
      - type: boiler
        name: HHW Boiler
        capacity: autosize
        efficiency: 0.85
        design_outlet_temp: 82.0
        design_water_flow_rate: autosize

  - name: CHW Loop
    design_supply_temp: 7.0
    design_delta_t: 5.0
    supply_equipment:
      - type: chiller
        name: Air-Cooled Chiller
        capacity: autosize
        cop: 3.5
        chw_setpoint: 7.0
        design_chw_flow: 0.0

# --- Thermostats ---
thermostats:
  - name: Office Thermostat
    zones: [Office Zone Group]
    heating_setpoint: 21.0
    cooling_setpoint: 24.0

# --- Outputs ---
outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - zone_infiltration_mass_flow
      - zone_supply_air_temperature
      - zone_supply_air_mass_flow
      - site_outdoor_temperature
      - site_direct_normal_radiation

summary_report: true
