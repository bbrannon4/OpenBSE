# OpenBSE Example: DOAS + Fan Coil Units (Commercial Office)
#
# 2-story commercial office building with dedicated outdoor air system (DOAS)
# serving ventilation to all zones, plus fan coil units (FCUs) for zone
# heating/cooling via chilled water and hot water plant loops.
#
# Zones:
#   - Open Office   (400 m2, 3.0m ceiling = 1200 m3)
#   - Conference    ( 80 m2, 3.0m ceiling =  240 m3)
#   - Lobby         ( 60 m2, 3.0m ceiling =  180 m3)
#
# Systems:
#   - DOAS air loop: 100% OA fan + CHW cooling coil + HHW heating coil
#     pre-conditions ventilation air to ~18C (summer) / ~20C (winter)
#   - FCU air loops: recirculating fan + CHW coil + electric heating coil per zone
#   - HHW plant loop: natural gas boiler
#   - CHW plant loop: air-cooled chiller
#
# Weather: Boulder, CO TMYx

simulation:
  timesteps_per_hour: 1
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31

weather_files:
  - "/Users/benjaminbrannon/Documents/WeatherFiles/USA_CO_Boulder.Muni.AP.720533_TMYx.2009-2023.epw"

# --- Design Days ---
design_days:
  - name: Boulder Heating 99.6%
    design_temp: -17.8
    daily_range: 0.0
    humidity_type: wetbulb
    humidity_value: -17.8
    pressure: 83411.0
    wind_speed: 2.3
    month: 1
    day: 21
    day_type: winter

  - name: Boulder Cooling 0.4%
    design_temp: 34.1
    daily_range: 15.2
    humidity_type: wetbulb
    humidity_value: 15.7
    pressure: 83411.0
    wind_speed: 4.0
    month: 7
    day: 21
    day_type: summer

# --- Schedules ---
schedules:
