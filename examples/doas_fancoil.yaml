# --- Materials ---
materials:
  - name: CMU Block
    conductivity: 0.89
    density: 1920.0
    specific_heat: 790.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  - name: Wall Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  - name: Gypsum Board
    conductivity: 0.16
    density: 800.0
    specific_heat: 830.0
    solar_absorptance: 0.4
    thermal_absorptance: 0.9
    roughness: smooth

  - name: Roof Membrane
    conductivity: 0.16
    density: 1120.0
    specific_heat: 1460.0
    solar_absorptance: 0.9
    thermal_absorptance: 0.9
    roughness: medium_rough

  - name: Roof Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  - name: Concrete Slab
    conductivity: 1.311
    density: 2240.0
    specific_heat: 836.8
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  - name: Slab Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

constructions:
  - name: Exterior Wall
    layers:
      - material: CMU Block
        thickness: 0.2032
      - material: Wall Insulation
        thickness: 0.0889
      - material: Gypsum Board
        thickness: 0.0159

  - name: Flat Roof
    layers:
      - material: Roof Membrane
        thickness: 0.0095
      - material: Roof Insulation
        thickness: 0.127
      - material: Gypsum Board
        thickness: 0.0159

  - name: Ground Floor
    layers:
      - material: Slab Insulation
        thickness: 0.0508
      - material: Concrete Slab
        thickness: 0.1016

simple_constructions:
  - name: Adiabatic Assembly
    u_factor: 0.001
    thickness: 0.2
    thermal_capacity: 20000.0
    solar_absorptance: 0.5
    thermal_absorptance: 0.9

  - name: Interior Partition
    u_factor: 2.0
    thickness: 0.13
    thermal_capacity: 15000.0
    solar_absorptance: 0.5
    thermal_absorptance: 0.9

window_constructions:
  - name: Commercial Glazing
    u_factor: 2.05
    shgc: 0.40
    visible_transmittance: 0.50

# --- Zones ---
# Building layout: 30m wide (E-W) x 18m deep (N-S), 3-story equiv
# Open Office: x=[0,20], y=[0,20] (ground floor main area)
# Conference:  x=[20,28], y=[0,10]
# Lobby:       x=[20,28], y=[10,18] (entry lobby)
zones:
  - name: Open Office
    volume: 1200.0
    floor_area: 400.0

  - name: Conference Room
    volume: 240.0
    floor_area: 80.0

  - name: Lobby
    volume: 180.0
    floor_area: 60.0

# --- Zone Groups ---
zone_groups:
  - name: Office Zone Group
    zones:
      - Open Office
      - Conference Room
      - Lobby

# --- People ---
people:
  - name: Open Office People
    zones: [Open Office]
    count: 40.0
    activity_level: 120.0
    radiant_fraction: 0.3
    schedule: Office Occupancy

  - name: Conference Room People
    zones: [Conference Room]
    count: 20.0
    activity_level: 120.0
    radiant_fraction: 0.3
    schedule: Conference Occupancy

  - name: Lobby People
    zones: [Lobby]
    count: 5.0
    activity_level: 120.0
    radiant_fraction: 0.3
    schedule: Lobby Occupancy

# --- Lights ---
lights:
  - name: Open Office Lights
    zones: [Open Office]
    power: 480.0
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Office Lighting

  - name: Conference Room Lights
    zones: [Conference Room]
    power: 128.0
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Office Lighting

  - name: Lobby Lights
    zones: [Lobby]
    power: 120.0
    radiant_fraction: 0.7
    return_air_fraction: 0.0
    schedule: Office Lighting

# --- Equipment ---
equipment:
  - name: Open Office Equipment
    zones: [Open Office]
    power: 800.0
    radiant_fraction: 0.3
    schedule: Office Equipment

  - name: Conference Room Equipment
    zones: [Conference Room]
    power: 120.0
    radiant_fraction: 0.3
    schedule: Conference Occupancy

  - name: Lobby Equipment
    zones: [Lobby]
    power: 60.0
    radiant_fraction: 0.3
    schedule: Lobby Occupancy

# --- Infiltration ---
infiltration:
  - name: Open Office Infiltration
    zones: [Open Office]
    air_changes_per_hour: 0.25

  - name: Conference Room Infiltration
    zones: [Conference Room]
    air_changes_per_hour: 0.2

  - name: Lobby Infiltration
    zones: [Lobby]
    air_changes_per_hour: 0.5

# --- Outdoor Air ---
outdoor_air:
  - name: Office Building OA
    zones: [Open Office, Conference Room, Lobby]
    per_person: 0.002360
    per_area: 0.000305

