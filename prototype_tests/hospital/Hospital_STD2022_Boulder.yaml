    design_chw_flow: 0.0
    condenser_type: water_cooled
    tower_approach: 5.56

# ─── DHW Systems ─────────────────────────────────────────────────────────────

dhw_systems:
# System 1: SWHSys1 — main hospital DHW (plant loop with 30 WaterUse:Equipment)
# Total peak flow from IDF: 1.0173e-04 m³/s = 0.10173 L/s
# Split into two load groups by schedule type
- name: Hospital SWHSys1
  mains_temperature: 10.0
  water_heater:
    name: SWHSys1 Water Heater
    fuel_type: gas
    tank_volume: 2271.0       # 2.271247 m³ = 2271 L (~600 gal)
    capacity: 175843.0        # 175,842.64 W
    efficiency: 0.95
    setpoint: 60.0
    ua_standby: 15.601        # W/K (on-cycle and off-cycle)
    deadband: 2.0             # IDF deadband delta temp
    parasitic_power: 14490.0  # W — constant gas parasitic (pilot/controls), no heat to tank
  loads:
  # Group 1: OR, Lab, PhysTherapy — BLDG_SWH_SCH (daytime schedule)
  # OR1(2.111e-6) + OR2_Mult5(2.111e-6) + OR3(2.111e-6) + OR4(6.306e-6)
  # + PhysTherapy(1.056e-6) + Lab_Flr3(2.111e-6) + Lab_Flr4(2.111e-6) = 1.792e-5 m³/s
  - name: Standard Zones (OR Lab PhysTherapy)
    peak_flow_rate: 0.01792   # L/s (sum of 7 WaterUse:Equipment)
    schedule: BLDG_SWH_SCH
    use_temperature: 60.0     # all target temps = 60°C
  # Group 2: ER, PatRoom, Kitchen, Radiology, Triage — BLDG_SWH_EXTD_SCH (24hr)
  # 2×ER_Exam(1.056e-6) + 2×ER_Trauma(1.056e-6) + ER_Triage(1.056e-6)
  # + 16×PatRoom(1.056e-6) + Kitchen(6.059e-5) + Radiology(1.056e-6) = 8.381e-5 m³/s
  - name: Extended Zones (ER PatRoom Kitchen)
    peak_flow_rate: 0.08381   # L/s (sum of 23 WaterUse:Equipment)
    schedule: BLDG_SWH_EXTD_SCH
    use_temperature: 60.0
# System 2: Laundry — stand-alone gas water heater (not on SWHSys1 plant loop)
- name: Laundry SWH
  mains_temperature: 10.0
  water_heater:
    name: SWH Laundry Water Heater
    fuel_type: gas
    tank_volume: 1136.0       # 1.1356235 m³ = 1136 L (~300 gal)
    capacity: 87921.0         # 87,921.32 W
    efficiency: 0.95
    setpoint: 82.22           # 180°F laundry
    ua_standby: 11.254        # W/K
    deadband: 2.0
  loads:
  - name: Laundry
    peak_flow_rate: 0.17665   # 1.766525e-4 m³/s = 0.17665 L/s
    schedule: LAUNDRY_SWH_SCH
    use_temperature: 82.22    # same as setpoint — 100% hot draw

# ─── Thermostats ─────────────────────────────────────────────────────────────

thermostats:
- name: Hospital Thermostat
  zones:
  - All Zones
  heating_setpoint: 21.0
  cooling_setpoint: 24.0

# ─── Outputs ─────────────────────────────────────────────────────────────────

outputs:
- file: zone_results.csv
  frequency: hourly
  variables:
  - zone_temperature
  - zone_heating_rate
  - zone_cooling_rate
  - zone_infiltration_mass_flow
  - zone_supply_air_temperature
  - zone_supply_air_mass_flow
  - site_outdoor_temperature

summary_report: true

# ─── NOT MODELED (limitations) ───────────────────────────────────────────────
# The following building features from the E+ prototype are not represented:
#
# 1. Zone multipliers (manually expanded into combined zones above)
# 2. Heat recovery chiller (94 kW, COP 2.84)
# 3. Primary/secondary CHW pumping (simplified to single variable-speed pump)
# 4. DCV: Infrastructure exists (dcv flag, per_person_oa/per_area_oa on zone
#    connections) but disabled because ASHRAE 62.1 rates don't match ASHRAE 170
#    minimums for healthcare, causing cooling/humidification inflation.
# 5. Rooftop PV system (84.5 kW)
# 6. Refrigeration equipment (walk-in freezer, display cases)
# 7. Elevators (34,668 W exterior equipment)
# 8. Booster water heater (electric, 3 kW, for dishwashing — small, ~DHW:Electricity)
# 9. C-factor underground walls for basement (modeled as minimal ext walls above grade)
# 10. Cooling towers on condenser loop (approximated via tower_approach on chillers)
# 11. Kitchen exhaust fans and makeup air
# 12. Interzone heat transfer between adjacent zones (all interior walls adiabatic)
# 13. Per-zone VAV flow modulation (flow currently divided equally among zones,
#     causing unrealistic temps for high-OA zones like ER/OR/ICU/Labs)
#
# MODELED via credit-based approach (not inline):
# - Heat recovery (6 enthalpy wheels): Uses credit-based approach because inline
#   HR causes paradoxical gas increase via SAT/reheat interaction. Credits are
#   capped at AHU coil heating load and aggregate gas is floored at zero.
# - Humidifiers: 5 electric steam humidifiers (VAV_1, VAV_2, VAV_ER, VAV_OR, VAV_ICU)
