# =============================================================================
# MATERIALS (from IDF Material and Material:NoMass objects)
# =============================================================================
materials:
  # F07 25mm stucco
  - name: F07 25mm Stucco
    conductivity: 0.72
    density: 1856.0
    specific_heat: 840.0
    solar_absorptance: 0.92
    thermal_absorptance: 0.9
    roughness: smooth

  # G01 16mm gypsum board
  - name: G01 16mm Gypsum Board
    conductivity: 0.16
    density: 800.0
    specific_heat: 1090.0
    solar_absorptance: 0.4
    thermal_absorptance: 0.9
    roughness: smooth

  # F13 Built-up roofing
  - name: F13 Built-up Roofing
    conductivity: 0.16
    density: 1120.0
    specific_heat: 1460.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  # F08 Metal surface (roof deck)
  - name: F08 Metal Surface
    conductivity: 45.28
    density: 7824.0
    specific_heat: 500.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: smooth

  # M10 200mm concrete block basement wall
  - name: M10 200mm Concrete Block
    conductivity: 1.326
    density: 1842.0
    specific_heat: 912.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  # 100mm Normalweight concrete floor
  - name: 100mm Normalweight Concrete
    conductivity: 2.31
    density: 2322.0
    specific_heat: 832.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  # 200mm Normalweight concrete floor
  - name: 200mm Normalweight Concrete
    conductivity: 2.31
    density: 2322.0
    specific_heat: 832.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: medium_rough

  # --- Synthetic insulation materials (from IDF Material:NoMass) ---
  # Created with k=0.036 W/mK (typical rigid insulation) so that
  # thickness = k * R_value matches the IDF thermal resistance.

  # Wall insulation (R=1.7128 m2K/W)
  - name: Wall Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  # Roof insulation (R=2.5986 m2K/W)
  - name: Roof Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  # Floor insulation (R=2.8829 m2K/W)
  - name: Floor Insulation
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.7
    thermal_absorptance: 0.9
    roughness: rough

  # Carpet pad (R=0.21648 m2K/W)
  - name: Carpet Pad
    conductivity: 0.036
    density: 28.0
    specific_heat: 1210.0
    solar_absorptance: 0.5
    thermal_absorptance: 0.9
    roughness: smooth

# =============================================================================
# CONSTRUCTIONS
# =============================================================================
constructions:
  # nonres_ext_wall: F07 stucco + G01 gypsum + insulation(R=1.7128) + G01 gypsum
  # Insulation R=1.7128 m2K/W, approximate as material layer:
  #   k=0.036, thickness = k*R = 0.036*1.7128 = 0.0617 m
  - name: Exterior Wall
    layers:
      - material: F07 25mm Stucco
        thickness: 0.0254
      - material: G01 16mm Gypsum Board
        thickness: 0.0159
      - material: Wall Insulation
        thickness: 0.0617
      - material: G01 16mm Gypsum Board
        thickness: 0.0159

  # nonres_roof: F13 built-up roofing + insulation(R=2.5986) + F08 metal deck
  # Insulation R=2.5986, thickness = 0.036*2.5986 = 0.0936 m
  - name: Flat Roof
    layers:
      - material: F13 Built-up Roofing
        thickness: 0.0095
      - material: Roof Insulation
        thickness: 0.0936
      - material: F08 Metal Surface
        thickness: 0.0008

  # Basement wall: M10 200mm concrete block
  - name: Basement Wall
    layers:
      - material: M10 200mm Concrete Block
        thickness: 0.2032

  # int_slab_floor: 100mm concrete + carpet pad (R=0.21648)
  # Carpet as thin insulation: thickness = 0.036*0.21648 = 0.0078 m
  - name: Interior Floor
    layers:
      - material: 100mm Normalweight Concrete
        thickness: 0.1016
      - material: Carpet Pad
        thickness: 0.0078

  # ext_slab_8in_with_carpet: 200mm concrete + carpet pad
  - name: Ground Floor
    layers:
      - material: 200mm Normalweight Concrete
        thickness: 0.2032
      - material: Carpet Pad
        thickness: 0.0078

  # Basement floor: 200mm normalweight concrete + floor insulation (R=2.8829)
  # Insulation thickness = 0.036*2.8829 = 0.1038 m
  - name: Basement Floor
    layers:
      - material: 200mm Normalweight Concrete
        thickness: 0.2032
      - material: Floor Insulation
        thickness: 0.1038

simple_constructions:
  # Interior partition: G01 13mm gypsum + G01 13mm gypsum
  # U = 1/(0.013/0.16 + 0.013/0.16) = 1/0.1625 = 6.15 W/m2K
  - name: Interior Partition
    u_factor: 6.15
    thickness: 0.026
    thermal_capacity: 15000.0
    solar_absorptance: 0.4
    thermal_absorptance: 0.9

  # Adiabatic floor/ceiling (for interzone)
  # U=3.0 is typical for a concrete slab. Since these surfaces have
  # boundary: adiabatic (T_outside = T_inside), U doesn't affect
  # steady-state heat flux — it only controls the CTF transient
  # response and thermal mass coupling to zone air.
  # U=0.01 caused NaN in CTF at sub-hourly timesteps (state-space
  # matrix too large from 2m synthetic insulation layer).
  - name: Adiabatic Assembly
    u_factor: 3.0
    thickness: 0.1
    thermal_capacity: 200000.0
    solar_absorptance: 0.5
    thermal_absorptance: 0.9

window_constructions:
  # WindowMaterial:SimpleGlazingSystem: U=3.2366 W/m2K, SHGC=0.39, VT=0.429
  - name: Office Glazing
    u_factor: 3.2366
    shgc: 0.39
    visible_transmittance: 0.429

