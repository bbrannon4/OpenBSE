# =============================================================================
# PLANT LOOPS
# =============================================================================
plant_loops:
  # --- Hot Water Loop ---
  # E+ IDF: Pump:VariableSpeed "HeatSys1 Pump", head=180705.7 Pa, eff=0.9
  # Curve: C1=0, C2=0.5726, C3=-0.3010, C4=0.7347
  - name: HHW Loop
    design_supply_temp: 82.0
    design_delta_t: 11.0
    supply_equipment:
      - type: pump
        name: HHW Pump
        pump_type: variable_speed
        design_flow_rate: autosize
        design_head: 180705.7
        motor_efficiency: 0.9
        motor_heat_to_fluid_fraction: 0.0
        power_curve: [0.0, 0.5726, -0.3010, 0.7347]

      - type: boiler
        name: HHW Boiler
        capacity: 3160025.0
        efficiency: 0.7925
        design_outlet_temp: 82.0
        design_water_flow_rate: autosize

  # --- Chilled Water Loop ---
  # E+ IDF: Primary-secondary pumping:
  #   Primary: 2× Pump:ConstantSpeed per chiller, head=123258.429 Pa, eff=0.9
  #     Each pump: design_flow=0.055642 m3/s, design_power=10583.99 W
  #   Secondary: Pump:VariableSpeed, head=133527.825 Pa, eff=0.9
  #     Curve: C1=0, C2=0.5726, C3=-0.3010, C4=0.7347
  - name: CHW Loop
    design_supply_temp: 6.67
    design_delta_t: 6.67
    supply_equipment:
      # Primary pumps (E+ has 2 constant speed pumps dedicated per-chiller;
      # modeled as single CS pump at combined flow since we can't couple
      # individual pumps to individual chillers)
      - type: pump
        name: CHW Primary Pump
        pump_type: constant_speed
        design_flow_rate: autosize
        design_head: 123258.429
        motor_efficiency: 0.9
        impeller_efficiency: 0.72
        motor_heat_to_fluid_fraction: 0.0
        num_pumps: 2

      # Secondary pump (variable speed, E+ demand-side pump)
      - type: pump
        name: CHW Secondary Pump
        pump_type: variable_speed
        design_flow_rate: autosize
        design_head: 133527.825
        motor_efficiency: 0.9
        impeller_efficiency: 0.72
        motor_heat_to_fluid_fraction: 0.0
        power_curve: [0.0, 0.5726, -0.3010, 0.7347]

      - type: chiller
        name: CHW Chiller 1
        capacity: 1570096.545
        cop: 6.11
        chw_setpoint: 6.67
        design_chw_flow: 0.0
        # Air-cooled: condenser temp = outdoor dry-bulb.
        # Matches simplified E+ IDF (AirCooled, no condenser water loop).
        condenser_type: air_cooled
        min_plr: 0.25
        # CAPFT: cap-f-t biquadratic (x=T_chw_leaving, y=T_cond_entering)
        capft:
          coefficients: [0.988289399105446, 0.031127718217927, -0.00154986412921254, -0.00334864255828258, -0.000146694443912943, 0.000502974958539996]
          min_x: 4.0
          max_x: 16.0
          min_y: 12.8
          max_y: 40.0
        # EIRFT: eir-f-t biquadratic (x=T_chw_leaving, y=T_cond_entering)
        eirft:
          coefficients: [0.563967192309392, -0.034330681975216, 0.00101506219660673, 0.0339405925147554, -0.000431970984586658, -0.0000252410848639146]
          min_x: 4.0
          max_x: 16.0
          min_y: 12.8
          max_y: 40.0
        # EIRFPLR: eir-f-plr quadratic (x=PLR)
        eirfplr:
          coefficients: [0.309752375539755, 0.153649268551135, 0.536462254009109]
          min_x: 0.0
          max_x: 1.0

      - type: chiller
        name: CHW Chiller 2
        capacity: 1570096.545
        cop: 6.11
        chw_setpoint: 6.67
        design_chw_flow: 0.0
        condenser_type: air_cooled
        min_plr: 0.25
        capft:
          coefficients: [0.988289399105446, 0.031127718217927, -0.00154986412921254, -0.00334864255828258, -0.000146694443912943, 0.000502974958539996]
          min_x: 4.0
          max_x: 16.0
          min_y: 12.8
          max_y: 40.0
        eirft:
          coefficients: [0.563967192309392, -0.034330681975216, 0.00101506219660673, 0.0339405925147554, -0.000431970984586658, -0.0000252410848639146]
          min_x: 4.0
          max_x: 16.0
          min_y: 12.8
          max_y: 40.0
        eirfplr:
          coefficients: [0.309752375539755, 0.153649268551135, 0.536462254009109]
          min_x: 0.0
          max_x: 1.0

  # --- Condenser Water Loop ---
  # E+ IDF: HeaderedPumps:VariableSpeed "TowerWaterSys Pump", 2 pumps
  #   head=209234.683 Pa, motor_eff=0.9
  #   Curve: C1=0, C2=0.0216, C3=-0.0325, C4=1.0095
  #   design_flow=0.158030 m3/s, design_power=55105.28 W
  # Condenser water carries chiller heat rejection (Q_evap + W_compressor).
  - name: Condenser Water Loop
    design_supply_temp: 21.1
    design_delta_t: 5.56
    supply_equipment:
      - type: pump
        name: CW Pump
        pump_type: variable_speed
        design_flow_rate: autosize
        design_head: 209234.683
        motor_efficiency: 0.9
        motor_heat_to_fluid_fraction: 0.0
        num_pumps: 2
        power_curve: [0.0, 0.0216, -0.0325, 1.0095]

# =============================================================================
# THERMOSTATS
# =============================================================================
thermostats:
  # Office zones: 21.0C heating / 24.0C cooling (occupied), 15.6C / 26.7C (unoccupied)
  - name: Office Thermostat
    zones: [Office Zones Bottom, Office Zones Mid, Office Zones Top, Basement Zone]
    heating_setpoint: 21.0
    cooling_setpoint: 24.0
    unoccupied_heating_setpoint: 15.6
    unoccupied_cooling_setpoint: 26.7

  # Data center zones: constant cooling
  - name: DataCenter Thermostat
    zones: [DataCenter Zones]
    heating_setpoint: 15.6
    cooling_setpoint: 24.0
    unoccupied_heating_setpoint: 15.6
    unoccupied_cooling_setpoint: 24.0

# =============================================================================
# DOMESTIC HOT WATER
# =============================================================================
dhw_systems:
  - name: SWHSys1
    # E+ Site:WaterMainsTemperature Correlation: annual_avg=9.95°C, max_diff=23.7°C
    # Hendron/Burch correlation average ≈ 13.3°C (offset=6°F≈3.3°C above annual OA avg)
    mains_temperature: 13.3
    water_heater:
      name: SWHSys1 Water Heater
      fuel_type: electric
      tank_volume: 1135.624
      capacity: 87921.32
      efficiency: 1.0
      setpoint: 60.0
      ua_standby: 4.74118
      deadband: 0.1
    # E+ IDF: Pump:ConstantSpeed "SWHSys1 Pump", head=29891 Pa, motor_eff=0.3
    # E+ design_flow=0.000440 m3/s, design_power=56.21 W
    pump:
      name: SWH Pump
      pump_type: constant_speed
      design_flow_rate: 0.000440
      design_head: 29891.0
      motor_efficiency: 0.3
      motor_heat_to_fluid_fraction: 0.0
    loads:
      # E+ WaterUse:Equipment: target_temp=60°C, hot_supply_temp=55°C
      # Since target ≥ hot_supply, E+ draws 100% of fixture flow from tank (no cold mixing)
      # Set use_temperature = setpoint so hot_frac = 1.0 to match E+ behavior
      - name: Core_bottom DHW
        peak_flow_rate: 0.03667
        schedule: BLDG_SWH_SCH
        use_temperature: 60.0

      # Core_mid zone has multiplier=10 in E+ IDF; flow scaled accordingly
      - name: Core_mid DHW
        peak_flow_rate: 0.36667
        schedule: BLDG_SWH_SCH
        use_temperature: 60.0

      - name: Core_top DHW
        peak_flow_rate: 0.03667
        schedule: BLDG_SWH_SCH
        use_temperature: 60.0

# =============================================================================
# EXTERIOR EQUIPMENT
# =============================================================================
exterior_equipment:
  - name: Exterior_Lights
    power: 64082.8
    fuel: electricity
    subcategory: Exterior Lights
    astronomical_clock: true

  - name: Elevator_Lift_Running
    power: 834376.0
    schedule: Elevator_Running_Sch
    fuel: electricity
    subcategory: ElevatorLift

  - name: Elevator_Lift_Standby
    power: 19200.0
    schedule: Elevator_Standby_Sch
    fuel: electricity
    subcategory: ElevatorLift

  - name: Elevators_Lights_Fan
    power: 1944.0
    fuel: electricity
    subcategory: ElevatorLightsFan

# =============================================================================
# OUTPUTS
# =============================================================================
outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - zone_infiltration_mass_flow
      - zone_supply_air_temperature
      - zone_supply_air_mass_flow
      - site_outdoor_temperature
      - site_direct_normal_radiation

  - file: "hvac_results.csv"
    frequency: hourly
    variables:
      - zone_heating_rate
      - zone_cooling_rate
      - zone_supply_air_temperature
      - zone_supply_air_mass_flow

summary_report: true
