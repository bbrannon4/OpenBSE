# OpenBSE: DOE Prototype Large Office Building (ASHRAE 90.1-2019 Appendix G)
#
# Building: 12-story + basement, 73.1m x 48.7m footprint, 3.96m floor-to-floor
# Location: Boulder, CO (Climate Zone 5B)
# HVAC: 3 VAV AHUs (bot/mid/top) + 1 CAV (basement) + PSZ-AC (data centers)
# Plant: HHW gas boiler + CHW air-cooled chiller
# DHW: Electric water heater
#
# All numeric values extracted from DOE Prototype LargeOffice_Denver.idf

simulation:
  timesteps_per_hour: 6
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31
  terrain: city
  # E+ Site:GroundTemperature:FCfactorMethod for Denver/Boulder.
  # Used by basement walls (only remaining ground-boundary surfaces).
