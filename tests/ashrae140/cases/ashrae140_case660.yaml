# OpenBSE ASHRAE Standard 140 — Case 660
#
# Case 660: Low-E Argon-Filled Double-Pane Windows
#
# Single-zone low-mass building in Denver, CO
# Reference: ASHRAE Standard 140-2023, Section 7.2.1
#
# Building: 8m (E-W) x 6m (N-S) x 2.7m height = 129.6 m3
# Same as Case 600 except windows are low-E argon-filled double-pane:
#   U = 1.19 W/(m²·K) (vs 3.0 in Case 600)
#   SHGC = 0.44 (vs 0.789 in Case 600)
#   Lower U-factor reduces conduction losses
#   Lower SHGC reduces solar heat gain
#
# Two south-facing windows: each 3m wide x 2m tall
# Low-mass construction, 0.5 ACH infiltration, 200W internal gains
#
# Vertex order: Counter-clockwise from outside (Newell convention)

simulation:
  timesteps_per_hour: 4
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31
  terrain: country

weather_files:
  - "ASHRAE 140-2023 Accompanying FIles/Std140_TF_Files/Normative Materials/725650TY.csv"

# ─── Simple Constructions ───────────────────────────────────────────────────
# Case 600 uses specific constructions. Using simple construction type
# with overall U-factor and thermal capacity.

simple_constructions:
  # Case 600 Wall: Wood Siding 9mm / Fiberglass 66mm / Plasterboard 12mm
  # R = 0.009/0.14 + 0.066/0.04 + 0.012/0.16 = 0.064 + 1.65 + 0.075 = 1.789
  # U = 1/1.789 = 0.559 W/(m2K) (without film, which CTF handles)
  # Thermal capacity: 9.0*530*900 + 12.0*950*840 = 4293 + 9576 = ~14 kJ/m2K
  - name: Case600 Wall
    u_factor: 0.559
    thickness: 0.087
    thermal_capacity: 14534.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9
    roughness: rough

  # Case 600 Roof: Roof Deck 19mm / Fiberglass 111.8mm / Plasterboard 10mm
  # R = 0.019/0.14 + 0.1118/0.04 + 0.010/0.16 = 0.136 + 2.795 + 0.0625 = 2.993
  # U = 1/2.993 = 0.334 W/(m2K)
  # Thermal capacity: ~15 kJ/m2K (low mass)
  - name: Case600 Roof
    u_factor: 0.334
    thickness: 0.141
    thermal_capacity: 18170.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9
    roughness: rough

  # Case 600 Floor: heavily insulated (R ~ 25 m2K/W), essentially adiabatic
  # Floor Insulation 1003mm / Timber Floor 25mm
  # R = 1.003/0.04 + 0.025/0.14 = 25.075 + 0.179 = 25.254
  # U = 1/25.254 = 0.040 W/(m2K)
  - name: Case600 Floor
    u_factor: 0.040
    thickness: 1.028
    thermal_capacity: 19500.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9

window_constructions:
  # Case 660 Window: low-E argon-filled double-pane
  # U = 1.19 W/(m²·K), SHGC = 0.44 at normal incidence
  # From WINDOW 7: ID 36, BESTEST Double Low-e Argon
  - name: Case660 Window
    u_factor: 1.19
    shgc: 0.44
    visible_transmittance: 0.65

# ─── No air loops needed ─────────────────────────────────────────────────────
# Ideal loads air system handles HVAC internally in the envelope solver.
# No air_loops, zone_groups, or controls needed for ASHRAE 140.

# ─── Outputs ──────────────────────────────────────────────────────────────────

outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - site_outdoor_temperature

  - file: "energy_monthly.csv"
    frequency: monthly
    aggregation: sum
    variables:
      - zone_heating_energy
      - zone_cooling_energy

summary_report: true

# ─── Zone ────────────────────────────────────────────────────────────────────
# Volume and floor area will be auto-calculated from surface vertices.

zones:
  - name: Case660 Zone
    # volume: auto-calculated (129.6 m3)
    # floor_area: auto-calculated (48.0 m2)
    # Interior solar distribution (ASHRAE 140 Section 7.2.1.13)
    solar_distribution:
      floor_fraction: 0.642
      wall_fraction: 0.191
      ceiling_fraction: 0.167

equipment:
  - name: Internal Gains
    zones: [Case660 Zone]
    power: 200.0              # 200W continuous, 60% radiant
    radiant_fraction: 0.6

infiltration:
  - name: Zone Infiltration
    zones: [Case660 Zone]
    air_changes_per_hour: 0.5

# Ideal loads air system — nonproportional thermostat
ideal_loads:
  - name: Zone Ideal Loads
    zones: [Case660 Zone]
    heating_setpoint: 20.0      # Heat ON if T < 20C
    cooling_setpoint: 27.0      # Cool ON if T > 27C
    heating_capacity: 1000000.0 # 1 MW (effectively unlimited)
    cooling_capacity: 1000000.0 # 1 MW (effectively unlimited)

# ─── Surfaces with 3D Vertices ──────────────────────────────────────────────
# All vertices are CCW when viewed from outside (outward normal convention).
# Coordinate system: X=East, Y=North, Z=Up. Origin at SW floor corner.

surfaces:
  # ── South Wall (faces south, normal = -Y) ──────────────────────────
  # 8m wide x 2.7m tall = 21.6 m2 gross
  # Net = 21.6 - 2*6.0 = 9.6 m2 (after subtracting two 3x2m windows)
  - name: South Wall
    zone: Case660 Zone
    type: wall
    construction: Case600 Wall
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 2.7}
      - {x: 0.0, y: 0.0, z: 2.7}

  # ── South Window 1 (west side) ─────────────────────────────────────
  # 3m wide x 2m tall, sill at 0.2m, starting at x=0.5m
  - name: South Window 1
    zone: Case660 Zone
    type: window
    construction: Case660 Window
    boundary: outdoor
    parent_surface: South Wall
    vertices:
      - {x: 0.5, y: 0.0, z: 0.2}
      - {x: 3.5, y: 0.0, z: 0.2}
      - {x: 3.5, y: 0.0, z: 2.2}
      - {x: 0.5, y: 0.0, z: 2.2}

  # ── South Window 2 (east side) ─────────────────────────────────────
  - name: South Window 2
    zone: Case660 Zone
    type: window
    construction: Case660 Window
    boundary: outdoor
    parent_surface: South Wall
    vertices:
      - {x: 4.5, y: 0.0, z: 0.2}
      - {x: 7.5, y: 0.0, z: 0.2}
      - {x: 7.5, y: 0.0, z: 2.2}
      - {x: 4.5, y: 0.0, z: 2.2}

  # ── North Wall (faces north, normal = +Y) ──────────────────────────
  - name: North Wall
    zone: Case660 Zone
    type: wall
    construction: Case600 Wall
    boundary: outdoor
    vertices:
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 6.0, z: 2.7}
      - {x: 8.0, y: 6.0, z: 2.7}

  # ── East Wall (faces east, normal = +X) ────────────────────────────
  - name: East Wall
    zone: Case660 Zone
    type: wall
    construction: Case600 Wall
    boundary: outdoor
    vertices:
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 2.7}
      - {x: 8.0, y: 0.0, z: 2.7}

  # ── West Wall (faces west, normal = -X) ────────────────────────────
  - name: West Wall
    zone: Case660 Zone
    type: wall
    construction: Case600 Wall
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 2.7}
      - {x: 0.0, y: 6.0, z: 2.7}

  # ── Roof (faces up, normal = +Z) ───────────────────────────────────
  - name: Roof
    zone: Case660 Zone
    type: roof
    construction: Case600 Roof
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 0.0, z: 2.7}
      - {x: 8.0, y: 0.0, z: 2.7}
      - {x: 8.0, y: 6.0, z: 2.7}
      - {x: 0.0, y: 6.0, z: 2.7}

  # ── Floor (faces down, normal = -Z) ────────────────────────────────
  # ASHRAE 140 Case 600: raised floor, heavily insulated
  # Using outdoor boundary (the insulation makes it nearly adiabatic)
  - name: Floor
    zone: Case660 Zone
    type: floor
    construction: Case600 Floor
    boundary: ground
    vertices:
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 0.0}
