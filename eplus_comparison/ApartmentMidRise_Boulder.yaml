# Virtual insulation layer representing ground thermal resistance.
# Matches E+ F-Factor ground floor: F=1.264 W/(m·K), Area=88.28 m², Perimeter=37.68 m.
# Effective R_total = Area/(F×Peri) = 1.855 m²·K/W.
# R_ground_insul = 1.855 - 0.11(film) - 0.217(carpet) - 0.155(conc) = 1.373 m²·K/W.
- name: Slab Ground Insulation
  conductivity: 0.04
  density: 28
  specific_heat: 1210
  solar_absorptance: 0.7
  thermal_absorptance: 0.9
  roughness: medium_smooth
