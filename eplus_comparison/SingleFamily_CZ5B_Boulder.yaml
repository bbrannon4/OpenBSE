# ── Door (back wall, 1st floor) ──
# 1.742m x 2.134m = 3.718 m2 — modeled as opaque wall section
# (door construction is similar to wall in thermal behavior)

# ══════════════════════════════════════════════════════════════════
# MISSING FUNCTIONALITY FLAGS:
#
# 1. DUCT COMPONENT: Now modeled with supply and return ducts through
#    unheated basement (U=0.71 W/m2-K, 4% leakage each = 8% total).
#
# 2. AIRFLOWNETWORK INFILTRATION: The IDF uses ELA-based multizone
#    infiltration (AirflowNetwork). We approximate with constant design
#    flow rate. AirflowNetwork should be removed from the E+ IDF for
#    fair comparison (replace with ZoneInfiltration:DesignFlowRate).
#    Future: add AirflowNetwork support to OpenBSE.
#
# 3. GAS EQUIPMENT: No native GasEquipment type — gas range, dryer,
#    misc gas gains are modeled as equipment with full input power and
#    lost_fraction. Energy tracking includes gas, but fuel type is not
#    distinguished from electric in the end-use summary.
#
# 4. UNCONDITIONED ZONES: Garage and basement are not modeled
#    as separate zones. Attic is modeled. Basement thermal buffering
#    is approximated with ground boundary condition for the floor.
#
# 5. GROUND HEAT TRANSFER: IDF uses Basement/Slab preprocessors for
#    detailed ground coupling. We use simplified ground boundary condition.
#
# 6. INTERNAL MASS: IDF has InteriorFurnishings (9.9 m2 of 6" wood).
#    Added as zone-level internal_mass property on living_unit1.
#
# 7. LATENT GAINS: Several equipment items have latent fractions
#    (dishwasher 0.15, gas range 0.06). OpenBSE doesn't model latent gains
#    from equipment separately.
#
# 8. EXTERIOR LIGHTING: 43.24 W exterior + 7.16 W garage lights.
#    Not included in this model.
# ══════════════════════════════════════════════════════════════════
