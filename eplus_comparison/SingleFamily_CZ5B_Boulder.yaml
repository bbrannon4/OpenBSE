# OpenBSE: Residential Single-Family House (IECC 2024, Climate Zone 5B)
# 2-story with unheated basement, gas furnace + DX cooling, tankless gas DHW
# Based on US+SF+CZ5B+gasfurnace+unheatedbsmt+IECC_2024.idf
# Boulder, CO weather

simulation:
  timesteps_per_hour: 6
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31
  terrain: suburbs
  # Match E+ Sizing:System FractionOfAutosized{Cooling,Heating}Capacity
  heating_sizing_factor: 1.25
  cooling_sizing_factor: 1.15
summary_report: true
weather_files:
- Boulder.epw
design_days:
- name: Denver Heating 99.6%
  design_temp: -17.9
  daily_range: 0.0
  humidity_type: wetbulb
  humidity_value: -17.9
  pressure: 82237.0
  wind_speed: 2.5
  month: 12
  day: 21
  day_type: winter
- name: Denver Cooling 0.4%
  design_temp: 33.9
  daily_range: 14.8
  humidity_type: wetbulb
  humidity_value: 15.0
  pressure: 82237.0
  wind_speed: 3.6
  month: 7
  day: 21
  day_type: summer

