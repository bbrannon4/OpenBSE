  min_x: -100.0
  max_x: 100.0
  min_y: -100.0
  max_y: 100.0
- name: Cool-EIR-fT
  curve_type: biquadratic
  coefficients: [0.38402403, 0.029696724, -0.0011329308, 0.006490674, 0.0002626992, -0.0001207224]
  min_x: -100.0
  max_x: 100.0
  min_y: -100.0
  max_y: 100.0
- name: Cool-PLF-fPLR
  curve_type: quadratic
  coefficients: [0.80141423, 0.23744685, -0.0393773]
  min_x: 0.0
  max_x: 1.0
