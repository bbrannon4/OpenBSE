- name: Interior Lighting
  zones: [Living]
  power: 337.990378    # 232.336176 + 105.654202 W hardwired + plug-in
  radiant_fraction: 0.8  # E+ Rad=0.6 + Vis=0.2; both go to surfaces area-weighted
  # visible_fraction: 0.2  # included in radiant_fraction above
  schedule: Interior Lighting

# ── Equipment ─────────────────────────────────────────────────────
equipment:
# ── Electric Equipment (all 6 non-zero objects from IDF) ────────
# Note: OpenBSE radiant_fraction is relative to zone gain (1-lost).
# Conversion: lost_fraction = E+_frac_lost + E+_frac_latent (latent not tracked)
#             radiant_fraction = E+_frac_radiant / (1 - lost_fraction)

- name: Dishwasher
  zones: [Living]
  power: 37.141034          # E+ dishwasher1
  radiant_fraction: 1.0     # E+ Rad=0.6/(1-0.40)=1.0, Conv=0
  lost_fraction: 0.40       # E+ Lost=0.25 + Lat=0.15
  schedule: DishWasher

- name: Refrigerator
  zones: [Living]
  power: 84.388186          # E+ refrigerator1
  radiant_fraction: 1.0
  lost_fraction: 0.0
  schedule: Refrigerator

- name: Clothes Washer
  zones: [Living]
  power: 12.693247          # E+ clotheswasher1
  radiant_fraction: 1.0     # E+ 0.8/(1-0.2)
  lost_fraction: 0.2
  schedule: ClothesWasher

- name: Gas Dryer Electric
  zones: [Living]
  power: 19.418219          # E+ gas_dryer1 (electric component)
  radiant_fraction: 1.0
  lost_fraction: 0.0
  schedule: ClothesDryer

- name: Misc Plug Loads
  zones: [Living]
  power: 507.149798         # E+ gas_mels1 (electric)
  radiant_fraction: 1.0     # E+ Rad=0.69/(1-0.31)=1.0, Conv=0
  lost_fraction: 0.31       # E+ Lost=0.25 + Lat=0.06
  schedule: Misc Plug Load

- name: IECC Adjustment
  zones: [Living]
  power: 505.399625         # E+ IECC_Adj1
  radiant_fraction: 0.5999  # E+ Rad=0.4119/(1-0.3135)=0.5999
  lost_fraction: 0.3135     # E+ Lost=0.2510 + Lat=0.0624
  schedule: Misc Plug Load

# ── Gas Equipment (full input power with lost_fraction) ─────────
# OpenBSE has no separate GasEquipment type. Using full gas input
# power with appropriate lost_fraction ensures:
#   1) equipment_power counter tracks total fuel input (matches E+)
#   2) zone gain = power*(1-lost) is correct for HVAC loads
- name: Gas Range
  zones: [Living]
  power: 540.941345         # E+ gas_range1 (full gas input)
  radiant_fraction: 1.0     # E+ Rad=0.69/(1-0.31)=1.0, Conv=0
  lost_fraction: 0.31       # E+ Lost=0.25 + Lat=0.06
  schedule: Cooking Range

- name: Gas Dryer
  zones: [Living]
  power: 395.595892         # E+ gas_dryer1 (gas component)
  radiant_fraction: 1.0     # E+ Rad=0.1/(1-0.90)=1.0, Conv=0
  lost_fraction: 0.90       # E+ Lost=0.85 + Lat=0.05
  schedule: ClothesDryer

- name: Gas Misc
  zones: [Living]
  power: 61.125464          # E+ gas_mels1 (gas component)
  radiant_fraction: 1.0     # E+ Rad=0.69/(1-0.31)=1.0, Conv=0
  lost_fraction: 0.31       # E+ Lost=0.25 + Lat=0.06
  schedule: Misc Plug Load

# ── Infiltration ──────────────────────────────────────────────────
# E+ model uses AirflowNetwork (ELA-based, pressure-driven). We approximate
# with a constant design flow rate. ASHRAE combined model (in engine)
# adds exhaust-induced makeup air: Q_comb = sqrt(Q_bg^2 + Q_exhaust^2).
# Matches E+ simplified IDF (simplify_sf_idf.py):
#   Q_bg = 0.0238 m3/s (~0.15 ACH background infiltration)
#   Q_exhaust = 0.02832 m3/s (60 cfm)
#   Engine applies ASHRAE combined: Q_comb = sqrt(0.0238^2 + 0.02832^2) = 0.037 m3/s
infiltration:
- name: Living Infiltration
  zones: [Living]
  design_flow_rate: 0.0238
  constant_coefficient: 1.0
  temperature_coefficient: 0.0
  wind_coefficient: 0.0

# Attic infiltration (~1 ACH for vented attic)
- name: Attic Infiltration
  zones: [attic]
  design_flow_rate: 0.023
  constant_coefficient: 1.0

# ── Ventilation / Outdoor Air ─────────────────────────────────────
# 60 cfm = 0.02832 m3/s mechanical ventilation via exhaust fan
exhaust_fans:
- name: Ventilation Exhaust
  zones: [Living]
  flow_rate: 0.02832

# ── Air Loops ─────────────────────────────────────────────────────
air_loops:
- name: Central System
  controls:
    cooling_supply_temp: 12.0
    heating_supply_temp: 50.0
    cycling: on_off
    design_zone_flow: autosize
    minimum_damper_position: 0.0   # No OA through AHU (exhaust-only ventilation)
  equipment:
  # NOTE: Ducts removed to match E+ simplified model (no AirflowNetwork = no duct losses)
  # Original E+ AFN had supply/return ducts through unheated basement, but
  # simplify_sf_idf.py removes all AirflowNetwork objects including duct modeling.
  - type: heating_coil
    name: Gas Furnace
    source: gas
    capacity: autosize
    efficiency: 0.80
    setpoint: 50.0
  - type: cooling_coil
    name: DX Cooling
    source: dx
    capacity: autosize
    cop: 4.0926
    shr: 0.75
    rated_airflow: autosize
    setpoint: 12.0
    cap_ft_curve: Cool-Cap-fT
    eir_ft_curve: Cool-EIR-fT
  - type: fan
    name: Supply Fan
    source: on_off
    design_flow_rate: autosize
    pressure_rise: 400.0
    motor_efficiency: 0.863
    impeller_efficiency: 0.58    # total_eff = 0.50054 = motor_eff * impeller_eff
    motor_in_airstream_fraction: 1.0
  zone_terminals:
  - zone: living_unit1

# ── DHW ───────────────────────────────────────────────────────────
# Tankless gas water heater, 0.97 thermal efficiency
# 5 separate DHW loads matching E+ WaterUse:Equipment objects exactly
dhw_systems:
- name: Residential DHW
  mains_temperature: 10.0
  water_heater:
    name: Tankless Gas WH
    fuel_type: gas
    # NOTE: E+ model is tankless (1 gal), but OpenBSE mixed-tank model needs
    # a reasonable volume for numerical stability at 600s timesteps.
    # Using 100L equivalent with low standby loss to approximate tankless.
    tank_volume: 100.0        # 100 L (stabilized tankless approximation)
    capacity: 1500            # 1.5 kW — reduced to prevent overshoot
                              # (OpenBSE uses on/off, E+ uses modulating)
    efficiency: 0.97
    setpoint: 48.0            # 118.4 F
    ua_standby: 0.0           # E+ IDF has UA=0 for this tankless heater
    deadband: 2.0
  loads:
  - name: Sinks
    peak_flow_rate: 0.071934  # 7.1934e-05 m³/s → 0.071934 L/s
    schedule: BA Sinks
    use_temperature: 40.556   # 105 F (SSBWaterTempSchedule)
  - name: Showers
    peak_flow_rate: 0.141975  # 1.41975e-04 m³/s → 0.141975 L/s
    schedule: BA Showers
    use_temperature: 40.556   # 105 F (SSBWaterTempSchedule)
  - name: Baths
    peak_flow_rate: 0.27764   # 2.7764e-04 m³/s → 0.27764 L/s
    schedule: BA Baths
    use_temperature: 40.556   # 105 F (SSBWaterTempSchedule)
  - name: Clothes Washer DHW
    peak_flow_rate: 0.001622  # 1.6219e-06 m³/s → 0.001622 L/s
    schedule: ClothesWasher Flow
    use_temperature: 48.889   # 120 F (CWWaterTempSchedule)
  - name: Dishwasher DHW
    peak_flow_rate: 0.000637  # 6.367e-07 m³/s → 0.000637 L/s
    schedule: Dishwasher Flow
    use_temperature: 48.889   # 120 F (DWWaterTempSchedule)

# ── Zones ─────────────────────────────────────────────────────────
# Single conditioned zone representing the 2-story living space
# E+ model uses AirflowNetwork for inter-zone coupling; we simplify to
# a single zone with equivalent volume and floor area.
zones:
- name: living_unit1
  volume: 572.2        # 220.82 m2 CFA * 2.591 m ceiling height
  floor_area: 220.82   # Conditioned floor area (2 stories)
  conditioned: true
  internal_mass:
  - construction: InteriorFurnishings
    area: 9.9           # 9.9 m² of 6" wood (matching E+ InternalMass object)

- name: attic
  volume: 83.8         # Gable roof 4:12 pitch, ridge height 1.517m
  floor_area: 110.41   # 12.133m x 9.100m
  conditioned: false

