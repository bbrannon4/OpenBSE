# OpenBSE ASHRAE Standard 140 — Case 985
#
# Case 985: High-Mass 20/20 Thermostat (No Deadband)
#
# Single-zone high-mass building in Denver, CO (Golden, CO weather)
# Reference: ASHRAE Standard 140-2023, Section 7.2.2.2
#
# Building: 8m (E-W) x 6m (N-S) x 2.7m height = 129.6 m3
# Same as Case 900 except thermostat has no deadband:
#   Heating setpoint: 20.0C
#   Cooling setpoint: 20.0C
# This means the zone is maintained at exactly 20C at all times.
#
# (Case 985 is to Case 900 as Case 685 is to Case 600.)
#
# High-mass construction (Table 7-27): concrete block walls, concrete slab floor
# Two south-facing windows: each 3m wide x 2m tall
# 0.5 ACH infiltration, 200W internal gains
#
# Coordinate system: X=East, Y=North, Z=Up
# Origin: SW corner of floor at ground level
#
# HVAC: Ideal loads air system, nonproportional thermostat
#   Heat ON if T < 20C, Cool ON if T > 20C (no deadband)
#   Capacity: 1 MW each (effectively unlimited)
#   All energy 100% convective to zone air
#
# Vertex order: Counter-clockwise from outside (Newell convention)

simulation:
  timesteps_per_hour: 4
  terrain: country
  start_month: 1
  start_day: 1
  end_month: 12
  end_day: 31

weather_files:
  - "ASHRAE 140-2023 Accompanying FIles/Std140_TF_Files/Normative Materials/725650TY.csv"

# --- Simple Constructions -------------------------------------------------------
# Case 900 high-mass constructions (Table 7-27).

simple_constructions:
  # Case 900 Wall: Concrete Block with insulation
  # U = 0.556 W/(m2K) surface-to-surface
  # Thermal capacity: 145154 J/(m2K) - high mass from concrete block
  - name: Case900 Wall
    u_factor: 0.556
    thickness: 0.1
    thermal_capacity: 145154.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9
    mass_conductivity: 0.51
    mass_density: 1400.0
    roughness: rough

  # Case 900 Roof: Same as Case 600 (lightweight)
  # U = 0.334 W/(m2K)
  - name: Case900 Roof
    u_factor: 0.334
    thickness: 0.141
    thermal_capacity: 18170.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9
    roughness: rough

  # Case 900 Floor: Concrete slab on grade, heavily insulated
  # U = 0.0396 W/(m2K), thermal capacity = 112000 J/(m2K)
  - name: Case900 Floor
    u_factor: 0.0396
    thickness: 0.08
    thermal_capacity: 112000.0
    solar_absorptance: 0.6
    thermal_absorptance: 0.9
    mass_conductivity: 1.13
    mass_density: 1400.0

window_constructions:
  # Double-pane clear glass (same as Case 900)
  - name: Case900 Window
    u_factor: 3.0
    shgc: 0.769
    pane_solar_transmittance: 0.834
    pane_solar_reflectance: 0.075
    # ISO 15099 first-principles gap thermal model properties
    num_panes: 2
    gap_width: 0.012
    pane_conductivity: 1.0
    pane_thickness: 0.003175
    glass_emissivity: 0.84
    visible_transmittance: 0.74

# --- Outputs ---------------------------------------------------------------------

outputs:
  - file: "zone_results.csv"
    frequency: hourly
    variables:
      - zone_temperature
      - zone_heating_rate
      - zone_cooling_rate
      - site_outdoor_temperature

  - file: "energy_monthly.csv"
    frequency: monthly
    aggregation: sum
    variables:
      - zone_heating_energy
      - zone_cooling_energy

summary_report: true

# --- Zone ------------------------------------------------------------------------

zones:
  - name: Case985 Zone
    solar_distribution:
      floor_fraction: 0.642
      wall_fraction: 0.191
      ceiling_fraction: 0.167

equipment:
  - name: Internal Gains
    zones: [Case985 Zone]
    power: 200.0
    radiant_fraction: 0.6

infiltration:
  - name: Zone Infiltration
    zones: [Case985 Zone]
    air_changes_per_hour: 0.5

# Ideal loads air system — no deadband thermostat
# Both heating and cooling setpoints at 20C
ideal_loads:
  - name: Zone Ideal Loads
    zones: [Case985 Zone]
    heating_setpoint: 20.0
    cooling_setpoint: 20.0
    heating_capacity: 1000000.0
    cooling_capacity: 1000000.0

# --- Surfaces with 3D Vertices --------------------------------------------------

surfaces:
  - name: South Wall
    zone: Case985 Zone
    type: wall
    construction: Case900 Wall
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 2.7}
      - {x: 0.0, y: 0.0, z: 2.7}

  - name: South Window 1
    zone: Case985 Zone
    type: window
    construction: Case900 Window
    boundary: outdoor
    parent_surface: South Wall
    vertices:
      - {x: 0.5, y: 0.0, z: 0.2}
      - {x: 3.5, y: 0.0, z: 0.2}
      - {x: 3.5, y: 0.0, z: 2.2}
      - {x: 0.5, y: 0.0, z: 2.2}

  - name: South Window 2
    zone: Case985 Zone
    type: window
    construction: Case900 Window
    boundary: outdoor
    parent_surface: South Wall
    vertices:
      - {x: 4.5, y: 0.0, z: 0.2}
      - {x: 7.5, y: 0.0, z: 0.2}
      - {x: 7.5, y: 0.0, z: 2.2}
      - {x: 4.5, y: 0.0, z: 2.2}

  - name: North Wall
    zone: Case985 Zone
    type: wall
    construction: Case900 Wall
    boundary: outdoor
    vertices:
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 6.0, z: 2.7}
      - {x: 8.0, y: 6.0, z: 2.7}

  - name: East Wall
    zone: Case985 Zone
    type: wall
    construction: Case900 Wall
    boundary: outdoor
    vertices:
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 2.7}
      - {x: 8.0, y: 0.0, z: 2.7}

  - name: West Wall
    zone: Case985 Zone
    type: wall
    construction: Case900 Wall
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 2.7}
      - {x: 0.0, y: 6.0, z: 2.7}

  - name: Roof
    zone: Case985 Zone
    type: roof
    construction: Case900 Roof
    boundary: outdoor
    vertices:
      - {x: 0.0, y: 0.0, z: 2.7}
      - {x: 8.0, y: 0.0, z: 2.7}
      - {x: 8.0, y: 6.0, z: 2.7}
      - {x: 0.0, y: 6.0, z: 2.7}

  - name: Floor
    zone: Case985 Zone
    type: floor
    construction: Case900 Floor
    boundary: ground
    vertices:
      - {x: 0.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 6.0, z: 0.0}
      - {x: 8.0, y: 0.0, z: 0.0}
      - {x: 0.0, y: 0.0, z: 0.0}
